<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --accent-glow: rgba(124,92,252,0.25);
      --text: #f0eeff;
      --text-muted: rgba(240,238,255,0.45);
      --text-dim: rgba(240,238,255,0.25);
      --green: #34d399;
      --red: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 0%, rgba(124,92,252,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 30% at 80% 100%, rgba(192,132,252,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #messages {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .welcome-orb {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
      box-shadow: 0 0 40px var(--accent-glow);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .welcome h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 520px;
    }
    .suggestion-chip {
      padding: 8px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .suggestion-chip:hover { border-color: rgba(124,92,252,0.4); color: var(--text); background: var(--surface2); }
    .msg {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.3s ease both;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 50px);
    }
    .msg.user .bubble { background: #1e1630; border: 1px solid rgba(124,92,252,0.2); border-top-right-radius: 4px; }
    .msg.ai .bubble { background: #13131e; border: 1px solid var(--border); border-top-left-radius: 4px; }
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: typingBounce 1.2s infinite ease-in-out; }
    .typing-dots span:nth-child(2){animation-delay:0.15s}
    .typing-dots span:nth-child(3){animation-delay:0.3s}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: rgba(124,92,252,0.4); box-shadow: 0 0 0 3px var(--accent-glow); }
    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      padding: 0;
    }
    #chat-input::placeholder { color: var(--text-dim); }
    #send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 15px;
    }
    #send-btn:hover:not(:disabled){transform:scale(1.05);opacity:0.9}
    #send-btn:disabled{opacity:0.35;cursor:not-allowed}
    .input-meta {
      display: flex;
      justify-content: space-between;
      max-width: 780px;
      margin: 8px auto 0;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">💧</div>
    Drip IA
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    En línea
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-orb">💧</div>
    <h1>Hola, soy Drip IA</h1>

      <button class="suggestion-chip" onclick="useSuggestion(this)">Dame ideas creativas</button>

</div>
